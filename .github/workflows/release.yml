name: Create release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive
    - name: set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - name: Install ninja
      run: sudo apt-get update && sudo apt-get install ninja-build
    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v1
      with:
       cmake-version: '3.31.1'
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Building project
      run: ./gradlew assemble   # 或 build，按你现在的
    - name: Get latest tag name
      id: get_latest_tag_name
      run: echo ::set-output name=VERSION::${GITHUB_REF/refs\/tags\//}
    - name: Force copy libs to executable/shell-files/libs
      run: |
        find . -name "libjiagu.so" -type f | while read so; do
          arch_dir=$(dirname "$so" | xargs basename)
          case "$arch_dir" in
            armeabi-v7a) target_arch="arm" ;;
            arm64-v8a)   target_arch="arm64" ;;
            x86)         target_arch="x86" ;;
            x86_64)      target_arch="x86_64" ;;
            *) continue ;;
          esac
          mkdir -p "executable/shell-files/libs/$target_arch"
          cp "$so" "executable/shell-files/libs/$target_arch/libjiagu.so"
          echo "Copied $so to executable/shell-files/libs/$target_arch/"
        done
        mkdir -p executable/shell-files/libs
    - name: Compress files
      run:  zip -r -q dpt-shell-${{ steps.get_latest_tag_name.outputs.VERSION }}.zip executable/
    - uses: "marvinpinto/action-automatic-releases@latest"
      with:
        repo_token: "${{ secrets.GITHUB_TOKEN }}"
        prerelease: false
        files: |
          dpt-shell-${{ steps.get_latest_tag_name.outputs.VERSION }}.zip