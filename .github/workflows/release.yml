name: Create release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Install ninja
      run: sudo apt-get update && sudo apt-get install ninja-build

    - name: Setup CMake 3.31.1
      uses: jwlawson/actions-setup-cmake@v1
      with:
        cmake-version: '3.31.1'

    - name: Grant execute permission
      run: chmod +x gradlew

    - name: Build release (dpt.jar + shell)
      run: ./gradlew :dpt:assemble :shell:assembleRelease

    - name: Prepare shell-files (dex and libs)
      run: |
        rm -rf executable/shell-files
        mkdir -p executable/shell-files/dex
        mkdir -p executable/shell-files/libs

        # copy classes.dex (release)
        DEX_PATH=$(find shell/build/intermediates/dex/release -name "classes.dex" | head -1)
        if [ -z "$DEX_PATH" ]; then
          echo "ERROR: classes.dex not found"
          exit 1
        fi
        cp "$DEX_PATH" executable/shell-files/dex/classes.dex
        echo "Copied dex: $DEX_PATH"

        # copy libjiagu.so (release stripped)
        for ABI in armeabi-v7a arm64-v8a x86 x86_64; do
          case $ABI in
            armeabi-v7a) DIR="arm" ;;
            arm64-v8a)   DIR="arm64" ;;
            x86)         DIR="x86" ;;
            x86_64)      DIR="x86_64" ;;
          esac
          SO_PATH=$(find shell/build/intermediates/stripped_native_libs/release -name "libjiagu.so" -path "*/$ABI/*" | head -1)
          if [ -n "$SO_PATH" ]; then
            mkdir -p "executable/shell-files/libs/$DIR"
            cp "$SO_PATH" "executable/shell-files/libs/$DIR/libjiagu.so"
            echo "Copied $ABI to $DIR"
          else
            echo "Warning: libjiagu.so for $ABI not found"
          fi
        done

    - name: Get tag name
      id: tag
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Compress
      run: zip -r -q dpt-shell-${{ steps.tag.outputs.VERSION }}.zip executable/

    - uses: marvinpinto/action-automatic-releases@latest
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        prerelease: false
        files: dpt-shell-${{ steps.tag.outputs.VERSION }}.zip