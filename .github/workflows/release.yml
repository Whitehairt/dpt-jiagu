name: Create release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive
    - name: set up JDK
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - name: Install ninja
      run: sudo apt-get update && sudo apt-get install ninja-build
    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v1
      with:
       cmake-version: '3.31.1'
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build dpt.jar and shell-release
      run: ./gradlew :dpt:assemble :shell:assembleRelease
    - name: Copy dpt.jar to executable
      run: |
        mkdir -p executable
        cp dpt/build/libs/dpt.jar executable/
    - name: Get latest tag name
      id: get_latest_tag_name
      run: echo ::set-output name=VERSION::${GITHUB_REF/refs\/tags\//}
    - name: Force copy libs (only release stripped)
      run: |
        for abi in armeabi-v7a arm64-v8a x86 x86_64; do
          case $abi in
            armeabi-v7a) target_arch="arm" ;;
            arm64-v8a)   target_arch="arm64" ;;
            x86)         target_arch="x86" ;;
            x86_64)      target_arch="x86_64" ;;
          esac
          so_file=$(find shell/build/intermediates/stripped_native_libs/release -name "libjiagu.so" -path "*/$abi/*" | head -n1)
          if [ -f "$so_file" ]; then
            mkdir -p "executable/shell-files/libs/$target_arch"
            cp "$so_file" "executable/shell-files/libs/$target_arch/libjiagu.so"
            echo "Copied $so_file to executable/shell-files/libs/$target_arch/"
          else
            echo "Warning: libjiagu.so for $abi not found"
          fi
        done
        mkdir -p executable/shell-files/libs
    - name: Compress files
      run:  zip -r -q dpt-shell-${{ steps.get_latest_tag_name.outputs.VERSION }}.zip executable/
    - uses: "marvinpinto/action-automatic-releases@latest"
      with:
        repo_token: "${{ secrets.GITHUB_TOKEN }}"
        prerelease: false
        files: |
          dpt-shell-${{ steps.get_latest_tag_name.outputs.VERSION }}.zip